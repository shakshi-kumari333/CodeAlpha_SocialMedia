<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Login - Connectify</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
<nav class="navbar" id="navbar"></nav>

<div class="form-card">
  <h2>Login</h2>
  <form id="login-form">
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" required />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" required />
    </div>
    <button type="submit" class="btn" style="width:100%;">Login</button>
    <p class="error-msg" id="error"></p>
  </form>
  <p class="hint">Demo account: aisha@example.com / password123</p>
  <div class="form-footer">Don't have an account? <a href="register.html" style="color:#7c3aed;">Register</a></div>
</div>

<script src="js/api.js"></script>
<script>
document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  const errorEl = document.getElementById('error');

  try {
    const data = await apiFetch('/auth/login', {
      method: 'POST',
      body: JSON.stringify({ email, password }),
    });
    setUser(data.user);
    window.location.href = 'index.html';
  } catch (err) {
    errorEl.textContent = err.message;
  }
});
</script>
</body>
</html>
